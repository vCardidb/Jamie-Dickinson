<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamie Dickinson | Levata</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            background:linear-gradient(
                to bottom,
                #a245a6 0%,
                #7a5eb7 45%,
                #0077c8 100%
            );

            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            padding:20px;
        }

        .card{

            background:white;

            max-width:550px;
            width:100%;

            padding:45px 40px;

            border-radius:24px;

            box-shadow:0 30px 50px -20px rgba(0,0,0,0.3);

            text-align:center;

            border-top:5px solid #0077c8;
        }

        .logo-container{

            margin-bottom:30px;

            padding:0;

            background:linear-gradient(
                to bottom,
                #a245a6 0%,
                #7a5eb7 45%,
                #0077c8 100%
            );

            border-radius:0;

            min-height:220px;

            display:flex;
            align-items:center;
            justify-content:center;

            overflow:hidden;
        }

        .logo-container img{

            transform:scale(2.1);

            max-width:100%;
            max-height:100%;

            width:auto;
            height:auto;

            display:block;

            object-fit:contain;

            margin-top:-15%;
            margin-bottom:-15%;
        }

        .name{

            font-size:2.5rem;

            font-weight:500;

            color:#1a2a3a;

            line-height:1.2;

            margin-bottom:5px;

            font-family:'Georgia', serif;
        }

        .company{

            font-size:1.4rem;

            color:#0077c8;

            font-weight:500;

            margin-bottom:25px;

            padding-bottom:15px;

            border-bottom:2px solid #e5eef5;

            letter-spacing:0.5px;
        }

        .detail{

            margin:30px 0;

            text-align:left;

            background:#f5f8fc;

            padding:25px;

            border-radius:16px;
        }

        .detail-item{

            display:flex;

            align-items:flex-start;

            margin:18px 0;

            font-size:1.1rem;
        }

        .emoji{

            font-size:1.5rem;

            margin-right:18px;

            min-width:35px;

            text-align:center;

            color:#0077c8;
        }

        .text{

            color:#2c4050;

            line-height:1.4;

            display:flex;

            align-items:center;

            gap:6px;

            flex-wrap:wrap;
        }

        .label{

            font-weight:600;

            color:#0077c8;

            min-width:28px;
        }

        .email{

            color:#0077c8;

            text-decoration:none;

            font-weight:500;

            word-break:break-word;
        }

        .email:hover{
            text-decoration:underline;
        }

        .website{

            margin:20px 0 15px;
        }

        .website-button{

            display:inline-block;

            background:#0077c8;

            color:white;

            text-decoration:none;

            padding:16px 32px;

            border-radius:40px;

            font-size:1.2rem;

            font-weight:500;

            box-shadow:0 6px 14px rgba(0,119,200,0.25);

            transition:all 0.2s;

            width:100%;

            letter-spacing:0.5px;
        }

        .website-button:hover{

            background:#005fa1;

            box-shadow:0 8px 18px rgba(0,119,200,0.35);

            transform:translateY(-2px);
        }

        .website-button:active{
            transform:translateY(0);
        }

        .vcard-button{

            display:inline-block;

            background:#0077c8;

            color:white;

            text-decoration:none;

            padding:16px 32px;

            border-radius:40px;

            font-size:1.2rem;

            font-weight:500;

            margin:5px 0 15px;

            box-shadow:0 6px 14px rgba(0,119,200,0.25);

            transition:all 0.2s;

            width:100%;

            border:none;

            cursor:pointer;

            letter-spacing:0.5px;
        }

        .vcard-button:hover{

            background:#005fa1;

            box-shadow:0 8px 18px rgba(0,119,200,0.35);

            transform:translateY(-2px);
        }

        .vcard-button:active{
            transform:translateY(0);
        }

        .hint{

            color:#6f8fa0;

            font-size:0.9rem;

            margin-top:15px;
        }

        .location{

            font-weight:600;

            color:#1a2a3a;

            margin-top:15px;

            font-size:0.95rem;
        }

        @media (max-width:480px){

            .card{
                padding:30px 20px;
            }

            .name{
                font-size:2rem;
            }

            .company{
                font-size:1.2rem;
            }

            .logo-container{
                min-height:190px;
            }

            .logo-container img{

                transform:scale(1.8);

                margin-top:-20%;
                margin-bottom:-20%;
            }

            .text{

                display:flex;

                flex-direction:column;

                align-items:flex-start;

                gap:2px;
            }

            .label{
                margin-bottom:2px;
            }

            .website-button,
            .vcard-button{

                font-size:1rem;

                padding:14px 20px;
            }

        }

    </style>
</head>

<body>

<div class="card">

    <div class="logo-container">

        <img src="levata-logo.jpg"
             alt="Levata"
             onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='block';">

        <div id="fallback-logo"
             style="
                display:none;
                font-size:2.2rem;
                font-weight:600;
                color:white;
                letter-spacing:1px;
             ">
            levata
        </div>

    </div>

    <h1 class="name">
        Jamie Dickinson
    </h1>

    <div class="company">
        Managing Director
    </div>

    <div class="detail">

        <div class="detail-item">

            <span class="emoji">📞</span>

            <span class="text">

                <span class="label">T:</span>

                <span>
                    +44 7701 225121
                </span>

            </span>

        </div>

        <div class="detail-item">

            <span class="emoji">✉️</span>

            <span class="text">

                <span class="label">M:</span>

                <a href="mailto:jamie.dickinson@levata.com"
                   class="email">
                    jamie.dickinson@levata.com
                </a>

            </span>

        </div>

    </div>

    <div class="website">

        <a href="https://www.levata.com"
           target="_blank"
           class="website-button">

            🌐 Visit Levata.com

        </a>

    </div>

    <a href="Jamie-Dickinson.vcf"
       class="vcard-button"
       rel="noopener noreferrer">

        ⬇️ Save Contact (vCard)

    </a>

    <div class="hint">
        Click to save Jamie's contact details to your device
    </div>

    <div class="location">
        Levata • Managing Director
    </div>

</div>

<script>

window.onload = function(){

    var img = document.querySelector('.logo-container img');

    if(img && img.complete && img.naturalHeight === 0){

        img.style.display='none';

        document.getElementById('fallback-logo').style.display='block';
    }
}

</script>

</body>
</html>
